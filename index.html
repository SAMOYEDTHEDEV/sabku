<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SABKU</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo-wrap">
    <img src="logo.png">
    <h1>SABKU</h1>
  </div>
</header>

<section class="hero">
  <h2>ศูนย์กลางนิสิต มก. บางเขน</h2>
  <p>ข่าวสาร • กิจกรรม • โอกาส</p>
  <button onclick="scrollToNews()">ดูข่าวล่าสุด</button>
</section>

<section class="container" id="news">
  <input type="text" id="search" placeholder="🔍 ค้นหาข่าว...">
  <div id="news-container"></div>
</section>

<script src="script.js"></script>

<script>
function scrollToNews(){
  document.getElementById('news').scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
